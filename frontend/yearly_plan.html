<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plant Inventory — Plan roczny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
    body { display: flex; height: 100vh; background: #eef4ee; overflow: hidden; flex-direction: column; }
    .banner { background:#eaf4e0; border-bottom:0.5px solid #b8d0b8; color:#3d6b27; padding:8px 16px; font-size:12px; text-align:center; flex-shrink:0; }
    .app { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .sidebar { width: 240px; min-width: 240px; background: #3d8f4b; display: flex; flex-direction: column; padding: 1.8rem 0; position: relative; z-index: 10; height: 100%; }
    .sidebar.collapsed { transform: translateX(-240px); position: fixed; height: 100%; top: 0; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 1.4rem 1.6rem; border-bottom: 0.5px solid #4ea85c; }
    .sidebar-logo-text { font-family: 'Playfair Display', serif; font-size: 16px; color: #e2f0d9; }
    .sidebar-logo svg { width: 28px; height: 28px; flex-shrink: 0; }
    .sidebar-nav { padding: 1.2rem 0; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 0.7rem 1.4rem; color: #d0f0d8; font-size: 13px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; text-decoration: none; }
    .nav-item:hover { background: rgba(255,255,255,0.1); }
    .nav-item.active { color: #fff; border-left-color: #c0e8c8; background: rgba(255,255,255,0.1); }
    .nav-item svg { width: 16px; height: 16px; opacity: 0.85; flex-shrink: 0; }
    .sidebar-bottom { padding: 1.2rem 1.4rem 0; border-top: 0.5px solid #4ea85c; font-size: 12px; color: #a8d8b0; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden; }
    .topbar { background: #fff; border-bottom: 0.5px solid #d0e4d0; padding: 0.9rem 1.6rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    .toggle-btn { background: none; border: none; cursor: pointer; padding: 4px; color: #4a6e4a; display: flex; align-items: center; flex-shrink: 0; }
    .topbar-title { font-family: 'Playfair Display', serif; font-size: 17px; color: #1e3d1e; flex: 1; }
    .content { padding: 1.4rem 1.6rem; flex: 1; overflow-y: auto; min-height: 0; }

    .yr-filter { display: flex; gap: 6px; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .yr-filter-btn { padding: 4px 12px; border: 0.5px solid #b8d0b8; border-radius: 20px; background: #fff; font-size: 12px; color: #4a6e4a; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
    .yr-filter-btn.active { background: #3d8f4b; color: #e2f0d9; border-color: #3d8f4b; }

    .yr-month { margin-bottom: 1.2rem; }
    .yr-month-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .yr-month-dot { width: 10px; height: 10px; border-radius: 50%; background: #3d8f4b; flex-shrink: 0; }
    .yr-month-dot.empty { background: #d0e4d0; }
    .yr-month-line { flex: 1; height: 0.5px; background: #d0e4d0; }
    .yr-month-name { font-size: 13px; font-weight: 500; color: #1e3d1e; min-width: 80px; }
    .yr-month-count { font-size: 11px; color: #7a9a7a; }

    .yr-tasks { padding-left: 20px; border-left: 1.5px solid #d0e4d0; margin-left: 4px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 4px; }
    .yr-task { background: #fff; border: 0.5px solid #d0e4d0; border-radius: 8px; padding: 7px 10px; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
    .yr-task.done { opacity: 0.45; }
    .yr-task.done .yr-task-desc { text-decoration: line-through; color: #9aaa9a; }
    .yr-task-check { width: 15px; height: 15px; border: 0.5px solid #b8d0b8; border-radius: 3px; cursor: pointer; appearance: none; background: #f5faf5; flex-shrink: 0; position: relative; transition: all 0.15s; }
    .yr-task-check:checked { background: #3d8f4b; border-color: #3d8f4b; }
    .yr-task-check:checked::after { content: ''; position: absolute; left: 3px; top: 1px; width: 4px; height: 8px; border: 1.5px solid #e2f0d9; border-top: none; border-left: none; transform: rotate(45deg); }
    .yr-task-body { flex: 1; min-width: 0; }
    .yr-task-desc { font-size: 12px; color: #1e3d1e; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .yr-task-meta { font-size: 10px; color: #94aa94; margin-top: 1px; }
    .yr-task-date { font-size: 11px; color: #94aa94; flex-shrink: 0; white-space: nowrap; }
    .yr-task-date.today { color: #3d8f4b; font-weight: 500; }
    .yr-task-date.overdue { color: #b05a2a; }
    .yr-empty { font-size: 12px; color: #b8d0b8; padding: 4px 0 4px 20px; margin-left: 4px; border-left: 1.5px solid #d0e4d0; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: #7a9a7a; font-size: 14px; }
  
    /* MOBILE */
    @media (max-width: 768px) {
      body { height: 100vh !important; }
      .banner { padding: 6px 10px; font-size: 11px; }
      .sidebar { position: fixed; top: 0; left: 0; height: 100%; z-index: 11; transform: translateX(-100%); box-shadow: 4px 0 16px rgba(0,0,0,0.2); transition: transform 0.3s ease; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: block; }
      .topbar { padding: 0.7rem 1rem; gap: 0.6rem; }
      .topbar-title { font-size: 15px; }
      .topbar-btn { padding: 5px 10px; font-size: 11px; }
      .content { padding: 1rem 0.9rem; }
      .plants-grid { grid-template-columns: 1fr !important; }
      .suggestions-grid { grid-template-columns: 1fr !important; }
      .form-card { padding: 1.2rem; }
      .suggest-card { padding: 1.2rem; }
      .yr-month-header { gap: 8px; }
      .yr-month-name { min-width: 70px; font-size: 12px; }
      .yr-tasks { padding-left: 14px; margin-left: 4px; }
      .yr-task { padding: 6px 8px; }
      .yr-task-desc { font-size: 11px; white-space: normal; }
      .yr-task-date { font-size: 10px; }
      .yr-task-meta { font-size: 9px; }
    }

  </style>
</head>
<body>
  <div class="banner">🌱 Aplikacja w trakcie rozwoju — dziękujemy za cierpliwość!</div>
  <div class="app">
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="#2d6e38" stroke="#4ea85c" stroke-width="0.8"/><path d="M14 22 C14 22, 8 16, 8 11 C8 8, 11 6, 14 8 C17 6, 20 8, 20 11 C20 16, 14 22, 14 22Z" fill="#c0e8c8"/><line x1="14" y1="8" x2="14" y2="22" stroke="#2d6e38" stroke-width="1"/></svg>
        <span class="sidebar-logo-text">Plant Inventory</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="2"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
          Planer zadań
        </a>
        <a class="nav-item" href="add_plant.html">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="11"/><line x1="5" y1="8" x2="11" y2="8"/></svg>
          Dodaj roślinę
        </a>
        <a class="nav-item" href="inventory.html">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2 C5 2, 2 5, 2 8 C2 11, 5 13, 8 14 C11 13, 14 11, 14 8 C14 5, 11 2, 8 2Z"/><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
          Moje rośliny
        </a>
        <a class="nav-item active" href="yearly_plan.html">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="11" y2="9"/><line x1="5" y1="12" x2="8" y2="12"/></svg>
          Plan roczny
        </a>
        <a class="nav-item" href="#">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12 L6 9 L9 11 L13 6"/><circle cx="13" cy="6" r="1.5" fill="currentColor" stroke="none"/></svg>
          Generuj PDF
        </a>
      </nav>
      <div class="sidebar-bottom">brzojr@gmail.com</div>
    </div>

    <div class="main">
      <div class="topbar">
        <button class="toggle-btn" onclick="toggleSidebar()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#4a6e4a" stroke-width="1.5"><line x1="2" y1="4" x2="16" y2="4"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="14" x2="16" y2="14"/></svg>
        </button>
        <div class="topbar-title">Plan roczny</div>
      </div>

      <div class="content">
        <div class="yr-filter" id="filter-row">
          <button class="yr-filter-btn active" onclick="filterPlant('all', this)">Wszystkie rośliny</button>
        </div>
        <div id="timeline">
          <div class="empty-state">🌿 Ładowanie...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://c072lvqc8i.execute-api.eu-central-1.amazonaws.com/dev';
    const USER_ID = 'brzojr@gmail.com';
    const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

    let allTasks = [];
    let currentFilter = 'all';

    function dateClass(str) {
      const d = new Date(str), t = new Date();
      t.setHours(0,0,0,0); d.setHours(0,0,0,0);
      if (d < t) return 'overdue';
      if (d.getTime() === t.getTime()) return 'today';
      return '';
    }

    function formatDay(str) {
      return new Date(str).toLocaleDateString('pl-PL', { day: 'numeric' });
    }

    function filterPlant(plant, btn) {
      currentFilter = plant;
      document.querySelectorAll('.yr-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTimeline();
    }

    function renderTimeline() {
      const filtered = currentFilter === 'all' ? allTasks : allTasks.filter(t => t.plant_name === currentFilter);
      const byMonth = {};
      for (let i = 1; i <= 12; i++) byMonth[i] = [];
      filtered.forEach(t => {
        const m = parseInt(t.date.split('-')[1]);
        if (m >= 1 && m <= 12) byMonth[m].push(t);
      });

      const html = Object.entries(byMonth).map(([m, mtasks]) => {
        const monthNum = parseInt(m);
        const hasTask = mtasks.length > 0;
        const taskHtml = mtasks.length
          ? mtasks.sort((a,b) => a.date.localeCompare(b.date)).map(t => {
              const dc = dateClass(t.date);
              return `<div class="yr-task ${t._done ? 'done' : ''}">
                <input type="checkbox" class="yr-task-check" ${t._done ? 'checked' : ''} onchange="toggleTask('${t.task_id}', this)"/>
                <div class="yr-task-body">
                  <div class="yr-task-desc">${t.description}</div>
                  <div class="yr-task-meta">${t.plant_name || ''}</div>
                </div>
                <div class="yr-task-date ${dc}">${dc === 'today' ? 'Dziś' : dc === 'overdue' ? 'Zaległe' : formatDay(t.date) + ' ' + MONTHS[monthNum-1].slice(0,3)}</div>
              </div>`;
            }).join('')
          : `<div class="yr-empty">Brak zadań</div>`;

        return `<div class="yr-month">
          <div class="yr-month-header">
            <div class="yr-month-dot ${hasTask ? '' : 'empty'}"></div>
            <span class="yr-month-name">${MONTHS[monthNum-1]}</span>
            ${hasTask ? `<span class="yr-month-count">${mtasks.length} zadań</span>` : ''}
            <div class="yr-month-line"></div>
          </div>
          <div class="yr-tasks">${taskHtml}</div>
        </div>`;
      }).join('');

      document.getElementById('timeline').innerHTML = html;
    }

    async function toggleTask(id, cb) {
      const t = allTasks.find(t => t.task_id === id);
      if (t) {
        t._done = cb.checked;
        renderTimeline();
        try {
          await fetch(`${API}/tasks`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({task_id: id, user_id: USER_ID, status: cb.checked ? 'done' : 'pending'})
          });
        } catch(e) { console.error('Failed to update task:', e); }
      }
    }

    async function loadTasks() {
      try {
        const r = await fetch(`${API}/tasks?user_id=${USER_ID}`);
        const data = await r.json();
        allTasks = (Array.isArray(data) ? data : JSON.parse(data.body || '[]')).map(t => ({...t, _done: t.status === 'done'}));

        const plants = [...new Set(allTasks.map(t => t.plant_name).filter(Boolean))];
        const filterRow = document.getElementById('filter-row');
        plants.forEach(p => {
          const btn = document.createElement('button');
          btn.className = 'yr-filter-btn';
          btn.textContent = p;
          btn.onclick = () => filterPlant(p, btn);
          filterRow.appendChild(btn);
        });

        renderTimeline();
      } catch(e) {
        document.getElementById('timeline').innerHTML = '<div class="empty-state">🌿 Błąd ładowania. Sprawdź połączenie.</div>';
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const isMobile = window.innerWidth <= 768;
      if (isMobile) {
        sidebar.classList.toggle('open');
        if (overlay) overlay.classList.toggle('visible');
      } else {
        sidebar.classList.toggle('collapsed');
      }
    }
    loadTasks();
  </script>
</body>
</html>
