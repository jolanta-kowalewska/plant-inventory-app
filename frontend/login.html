<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plant Inventory — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef4ee;
      position: relative;
      overflow: hidden;
    }

    .bg-leaves {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      background: #ffffff;
      border: 0.5px solid #b8d4b8;
      border-radius: 18px;
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 2;
      animation: fadeUp 0.7s ease both;
      margin: 2rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.8rem; }
    .logo-icon { width: 36px; height: 36px; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: #1e3d1e; letter-spacing: 0.02em; }

    .tagline {
      font-size: 12px; color: #6b8f6b; font-weight: 300; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 2rem; padding-bottom: 1.5rem;
      border-bottom: 0.5px solid #d0e4d0;
    }

    .field-label { font-size: 11px; font-weight: 500; color: #4a6e4a; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .field-wrap { margin-bottom: 1.2rem; }

    .field-input {
      width: 100%; height: 44px; border: 0.5px solid #b8d0b8; border-radius: 10px;
      background: #f5faf5; padding: 0 14px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: #1e3d1e; outline: none; transition: border-color 0.2s;
    }
    .field-input:focus { border-color: #4a7c2f; background: #fff; }
    .field-input::placeholder { color: #a8c4a8; }

    .btn-login {
      width: 100%; height: 46px; background: #3d8f4b; border: none; border-radius: 10px;
      color: #e2f0d9; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; margin-top: 0.8rem;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-login:hover { background: #2d6e38; }
    .btn-login:active { transform: scale(0.98); }

    .footer-note { text-align: center; font-size: 12px; color: #7a9a7a; margin-top: 1.4rem; }
    .footer-note a { color: #3d6b27; text-decoration: none; font-weight: 500; }
  </style>
</head>

<div class="card">
  <div class="logo-row">
    <svg class="logo-icon" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="17" fill="#e2f0d9" stroke="#94c47a" stroke-width="0.8"/>
      <path d="M18 28 C18 28, 10 20, 10 14 C10 10, 14 7, 18 9 C22 7, 26 10, 26 14 C26 20, 18 28, 18 28Z" fill="#3a7a2a"/>
      <line x1="18" y1="9" x2="18" y2="28" stroke="#e2f0d9" stroke-width="1.2"/>
      <line x1="18" y1="17" x2="13" y2="14" stroke="#e2f0d9" stroke-width="0.9"/>
      <line x1="18" y1="20" x2="23" y2="17" stroke="#e2f0d9" stroke-width="0.9"/>
    </svg>
    <span class="logo-text">Plant Inventory</span>
  </div>

  <p class="tagline">Twój ogród, Twoje zasady</p>

  <div class="field-wrap">
    <label class="field-label">Email</label>
    <input class="field-input" type="email" placeholder="imie@example.com" id="email-input"/>
  </div>

  <div class="field-wrap">
    <label class="field-label">Hasło</label>
    <input class="field-input" type="password" placeholder="••••••••" id="pass-input"/>
  </div>

  <button class="btn-login" onclick="handleLogin()">Zaloguj się</button>
  <p class="footer-note">Nie masz konta? <a href="#">Zarejestruj się</a></p>
</div>

<script>
function handleLogin() {
  const email = document.getElementById('email-input').value;
  if (!email) { document.getElementById('email-input').focus(); return; }
  window.location.href = 'dashboard.html';
}
</script>

</html>
