<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plant Inventory — Moje rośliny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
    body { display: flex; min-height: 100vh; background: #eef4ee; overflow: hidden; }
    .sidebar { width: 240px; min-width: 240px; background: #3d8f4b; display: flex; flex-direction: column; padding: 1.8rem 0; position: relative; z-index: 10; height: 100vh; }
    .sidebar.collapsed { transform: translateX(-240px); position: fixed; height: 100%; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 1.4rem 1.6rem; border-bottom: 0.5px solid #4ea85c; }
    .sidebar-logo-text { font-family: 'Playfair Display', serif; font-size: 16px; color: #e2f0d9; }
    .sidebar-logo svg { width: 28px; height: 28px; flex-shrink: 0; }
    .sidebar-nav { padding: 1.2rem 0; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 0.7rem 1.4rem; color: #d0f0d8; font-size: 13px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; text-decoration: none; }
    .nav-item:hover { background: rgba(255,255,255,0.1); }
    .nav-item.active { color: #fff; border-left-color: #c0e8c8; background: rgba(255,255,255,0.1); }
    .nav-item svg { width: 16px; height: 16px; opacity: 0.85; flex-shrink: 0; }
    .sidebar-bottom { padding: 1.2rem 1.4rem 0; border-top: 0.5px solid #4ea85c; font-size: 12px; color: #a8d8b0; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; overflow: hidden; }
    .topbar { background: #fff; border-bottom: 0.5px solid #d0e4d0; padding: 0.9rem 1.6rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    .toggle-btn { background: none; border: none; cursor: pointer; padding: 4px; color: #4a6e4a; display: flex; align-items: center; flex-shrink: 0; }
    .topbar-title { font-family: 'Playfair Display', serif; font-size: 17px; color: #1e3d1e; flex: 1; }
    .topbar-btn { padding: 6px 14px; background: #3d8f4b; border: none; border-radius: 20px; color: #e2f0d9; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: background 0.15s; text-decoration: none; }
    .topbar-btn:hover { background: #2d6e38; }
    .content { padding: 1.2rem 1.4rem; flex: 1; overflow-y: auto; }
    .plants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .plant-card { background: #fff; border: 0.5px solid #d0e4d0; border-radius: 14px; padding: 1.2rem; display: flex; flex-direction: column; gap: 10px; animation: slideIn 0.3s ease both; }
    @keyframes slideIn { from { opacity:0; transform:translateY(5px);} to { opacity:1; transform:translateY(0);} }
    .plant-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .plant-name { font-family: 'Playfair Display', serif; font-size: 14px; color: #1e3d1e; line-height: 1.3; }
    .plant-scientific { font-size: 11px; color: #7a9a7a; font-style: italic; line-height: 1.3; }
    .plant-footer { display: flex; justify-content: flex-end; margin-top: auto; padding-top: 6px; border-top: 0.5px solid #eef4ee; }
    .btn-delete { padding: 4px 12px; border: 0.5px solid #f0b8a8; border-radius: 20px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 11px; color: #b05a2a; cursor: pointer; transition: background 0.15s; }
    .btn-delete:hover { background: #fff5f0; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: #7a9a7a; font-size: 14px; }
    .empty-state .icon { font-size: 32px; margin-bottom: 0.5rem; }
    .empty-btn { display: inline-block; margin-top: 1rem; padding: 8px 20px; background: #3d8f4b; border: none; border-radius: 20px; color: #e2f0d9; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; text-decoration: none; }
  
    /* MOBILE */
    @media (max-width: 768px) {
      body { height: 100vh !important; }
      .banner { padding: 6px 10px; font-size: 11px; }
      .sidebar { position: fixed; top: 0; left: 0; height: 100%; z-index: 11; transform: translateX(-100%); box-shadow: 4px 0 16px rgba(0,0,0,0.2); transition: transform 0.3s ease; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: block; }
      .topbar { padding: 0.7rem 1rem; gap: 0.6rem; }
      .topbar-title { font-size: 15px; }
      .topbar-btn { padding: 5px 10px; font-size: 11px; }
      .content { padding: 1rem 0.9rem; }
      .plants-grid { grid-template-columns: 1fr !important; }
      .suggestions-grid { grid-template-columns: 1fr !important; }
      .form-card { padding: 1.2rem; }
      .suggest-card { padding: 1.2rem; }
      .yr-month-header { gap: 8px; }
      .yr-month-name { min-width: 70px; font-size: 12px; }
      .yr-tasks { padding-left: 14px; margin-left: 4px; }
      .yr-task { padding: 6px 8px; }
      .yr-task-desc { font-size: 11px; white-space: normal; }
      .yr-task-date { font-size: 10px; }
      .yr-task-meta { font-size: 9px; }
    }

  </style>
</head>
<body>
<div style="background:#eaf4e0; border-bottom:0.5px solid #b8d0b8; color:#3d6b27; padding:8px 16px; font-size:12px; text-align:center; font-family:'DM Sans',sans-serif;">
  🌱 Aplikacja w trakcie rozwoju — dziękujemy za cierpliwość!
</div>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="#2d6e38" stroke="#4ea85c" stroke-width="0.8"/><path d="M14 22 C14 22, 8 16, 8 11 C8 8, 11 6, 14 8 C17 6, 20 8, 20 11 C20 16, 14 22, 14 22Z" fill="#c0e8c8"/><line x1="14" y1="8" x2="14" y2="22" stroke="#2d6e38" stroke-width="1"/></svg>
      <span class="sidebar-logo-text">Plant Inventory</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="2"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        Planer zadań
      </a>
      <a class="nav-item" href="add_plant.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="11"/><line x1="5" y1="8" x2="11" y2="8"/></svg>
        Dodaj roślinę
      </a>
      <a class="nav-item active" href="inventory.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2 C5 2, 2 5, 2 8 C2 11, 5 13, 8 14 C11 13, 14 11, 14 8 C14 5, 11 2, 8 2Z"/><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        Moje rośliny
      </a>
      <a class="nav-item" href="yearly_plan.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="11" y2="9"/><line x1="5" y1="12" x2="8" y2="12"/></svg>
        Plan roczny
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12 L6 9 L9 11 L13 6"/><circle cx="13" cy="6" r="1.5" fill="currentColor" stroke="none"/></svg>
        Generuj PDF
      </a>
    </nav>
    <div class="sidebar-bottom">brzojr@gmail.com</div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="toggle-btn" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#4a6e4a" stroke-width="1.5"><line x1="2" y1="4" x2="16" y2="4"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="14" x2="16" y2="14"/></svg>
      </button>
      <div class="topbar-title">Moje rośliny</div>
      <a class="topbar-btn" href="add_plant.html">+ Dodaj roślinę</a>
    </div>

    <div class="content">
      <div class="plants-grid" id="plants-grid">
        <div class="empty-state" style="grid-column: 1/-1;">
          <div class="icon">🌿</div>
          <p>Ładowanie...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://c072lvqc8i.execute-api.eu-central-1.amazonaws.com/dev';
    const USER_ID = 'brzojr@gmail.com';

    function plantColor(name) {
      const colors = ['#eaf4e0','#e0f0ea','#e8f4e4','#dff0e8','#e4f2dc'];
      let h = 0; for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
      return colors[h % colors.length];
    }

    function plantIconColor(name) {
      const colors = ['#3d8f4b','#2d6e38','#4e8c38','#3a7a2a','#5a9e4a'];
      let h = 0; for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
      return colors[h % colors.length];
    }

    function renderPlants(plants, tasks = []) {
      const grid = document.getElementById('plants-grid');
      if (!plants.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;">
          <div class="icon">🌱</div>
          <p>Nie masz jeszcze żadnych roślin.</p>
          <a class="empty-btn" href="add_plant.html">Dodaj pierwszą roślinę</a>
        </div>`;
        return;
      }
      grid.innerHTML = plants.map((plant, i) => {
        const bg = plantColor(plant.plant_name || '');
        const ic = plantIconColor(plant.plant_name || '');
        const taskCount = tasks.filter(t => t.plant_name === plant.plant_name).length;
        const taskLabel = taskCount === 1 ? '1 zadanie' : taskCount > 1 ? `${taskCount} zadań` : 'brak zadań';
        return `<div class="plant-card" style="animation-delay:${i*0.06}s">
          <div class="plant-icon" style="background:${bg}">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M11 3 C7 3, 3 7, 3 11 C3 15, 7 19, 11 19 C11 19, 11 3, 11 3Z" fill="${ic}" opacity="0.7"/>
              <path d="M11 3 C15 3, 19 7, 19 11 C19 15, 15 19, 11 19 C11 19, 11 3, 11 3Z" fill="${ic}"/>
              <line x1="11" y1="3" x2="11" y2="19" stroke="#e2f0d9" stroke-width="1"/>
            </svg>
          </div>
          <div>
            <div class="plant-name">${plant.plant_name_pl || plant.plant_name || '—'}</div>
            <div class="plant-scientific">${plant.scientific_name || ''}</div>
          </div>
          <div style="display:flex; gap:4px; flex-wrap:wrap; margin-top:4px;">
            ${plant.preferred_place ? `<span style="font-size:10px; padding:2px 7px; border-radius:10px; background:#eaf4e0; color:#3a6e28;">${{'sunny':'słoneczne','partial_shade':'półcieniste','shade':'cieniste'}[plant.preferred_place] || plant.preferred_place}</span>` : ''}
            ${plant.watering ? `<span style="font-size:10px; padding:2px 7px; border-radius:10px; background:#eaf4e0; color:#3a6e28;">${{'low':'rzadkie','moderate':'umiarkowane','high':'częste'}[plant.watering] || plant.watering}</span>` : ''}
          </div>
          <div style="font-size:12px; color:#4a6e4a;">${taskLabel} w tym roku</div>
          <div class="plant-footer">
            <button class="btn-delete" onclick="deletePlant('${plant.species_id}', '${plant.plant_name}')">Usuń</button>
          </div>
        </div>`;
      }).join('');
    }

    async function deletePlant(speciesId, plantName) {
      if (!confirm(`Usunąć "${plantName}" z inwentarza? Zostaną też usunięte wszystkie powiązane zadania.`)) return;
      try {
        const r = await fetch(`${API}/inventory`, {
          method: 'DELETE',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({user_id: USER_ID, species_id: speciesId, plant_name: plantName})
        });
        if (r.ok) {
          await loadInventory();
        } else {
          alert('Błąd podczas usuwania. Spróbuj ponownie.');
        }
      } catch(e) {
        alert('Błąd połączenia. Spróbuj ponownie.');
      }
    }

    async function loadInventory() {
      try {
        const [invRes, tasksRes] = await Promise.all([
          fetch(`${API}/inventory?user_id=${USER_ID}`),
          fetch(`${API}/tasks?user_id=${USER_ID}`)
        ]);
        const invData = await invRes.json();
        const tasksData = await tasksRes.json();
        const plants = Array.isArray(invData) ? invData : JSON.parse(invData.body || '[]');
        const tasks = Array.isArray(tasksData) ? tasksData : JSON.parse(tasksData.body || '[]');
        renderPlants(plants, tasks);
      } catch(e) {
        document.getElementById('plants-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🌿</div><p>Błąd ładowania. Sprawdź połączenie.</p></div>';
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const isMobile = window.innerWidth <= 768;
      if (isMobile) {
        sidebar.classList.toggle('open');
        if (overlay) overlay.classList.toggle('visible');
      } else {
        sidebar.classList.toggle('collapsed');
      }
    }

    loadInventory();
  </script>
</body>
</html>
