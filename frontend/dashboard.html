<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plant Inventory — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
    body { display: flex; height: 100vh; background: #eef4ee; overflow: hidden; flex-direction: column; }
    .banner { background:#eaf4e0; border-bottom:0.5px solid #b8d0b8; color:#3d6b27; padding:8px 16px; font-size:12px; text-align:center; flex-shrink:0; }
    .app { display: flex; flex: 1; overflow: hidden; min-height: 0; position: relative; }

    .sidebar { width: 240px; min-width: 240px; background: #3d8f4b; display: flex; flex-direction: column; padding: 1.8rem 0; transition: transform 0.3s ease; position: relative; z-index: 10; height: 100%; overflow-y: auto; }
    .sidebar.collapsed { transform: translateX(-240px); position: fixed; height: 100%; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .sidebar-overlay.visible { opacity: 1; pointer-events: auto; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 1.4rem 1.6rem; border-bottom: 0.5px solid #4ea85c; }
    .sidebar-logo-text { font-family: 'Playfair Display', serif; font-size: 16px; color: #e2f0d9; }
    .sidebar-logo svg { width: 28px; height: 28px; flex-shrink: 0; }
    .sidebar-nav { padding: 1.2rem 0; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 0.7rem 1.4rem; color: #d0f0d8; font-size: 13px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; text-decoration: none; }
    .nav-item:hover { background: rgba(255,255,255,0.06); }
    .nav-item.active { color: #e2f0d9; border-left-color: #d0f0d8; background: rgba(255,255,255,0.06); }
    .nav-item svg { width: 16px; height: 16px; opacity: 0.8; flex-shrink: 0; }
    .sidebar-bottom { padding: 1.2rem 1.4rem 0; border-top: 0.5px solid #4ea85c; font-size: 12px; color: #a8d8b0; }

    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; height: 100%; overflow: hidden; }
    .topbar { background: #fff; border-bottom: 0.5px solid #d0e4d0; padding: 0.9rem 1.6rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    .toggle-btn { background: none; border: none; cursor: pointer; padding: 4px; color: #4a6e4a; display: flex; align-items: center; flex-shrink: 0; }
    .topbar-greeting { font-family: 'Playfair Display', serif; font-size: 17px; color: #1e3d1e; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-greeting span { font-style: italic; }
    .topbar-date { font-size: 12px; color: #7a9a7a; flex-shrink: 0; }
    .content { padding: 1.2rem 1.4rem; flex: 1; overflow-y: auto; min-height: 0; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
    .stat-card { background: #fff; border: 0.5px solid #d0e4d0; border-radius: 10px; padding: 0.7rem 1rem; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 500; color: #1e3d1e; }
    .stat-lbl { font-size: 11px; color: #7a9a7a; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }

    .filters { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
    .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .filter-label { font-size: 10px; color: #7a9a7a; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; min-width: 42px; flex-shrink: 0; }
    .filter-btn { padding: 5px 13px; border: 0.5px solid #b8d0b8; border-radius: 20px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #4a6e4a; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .filter-btn:hover { background: #f0f8f0; }
    .filter-btn.active { background: #3d8f4b; color: #e2f0d9; border-color: #3d8f4b; }
    .filter-select-wrap { position: relative; max-width: 220px; flex: 1; min-width: 140px; }
    .filter-select { width: 100%; padding: 5px 28px 5px 13px; border: 0.5px solid #b8d0b8; border-radius: 20px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #4a6e4a; outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; }
    .filter-select:focus { border-color: #3d8f4b; }
    .filter-select-arrow { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; }

    .section-title { font-size: 11px; color: #7a9a7a; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.6rem; }
    .task-list { display: flex; flex-direction: column; gap: 6px; }
    .task-item { background: #fff; border: 0.5px solid #d0e4d0; border-radius: 10px; padding: 0.7rem 1rem; display: flex; align-items: center; gap: 10px; transition: opacity 0.2s; animation: slideIn 0.3s ease both; }
    @keyframes slideIn { from { opacity:0; transform:translateY(5px);} to { opacity:1; transform:translateY(0);} }
    .task-item.done { opacity: 0.45; }
    .task-item.done .task-desc { text-decoration: line-through; color: #9aaa9a; }
    .task-check { width: 17px; height: 17px; border: 0.5px solid #b8d0b8; border-radius: 4px; cursor: pointer; appearance: none; background: #f5faf5; flex-shrink: 0; position: relative; transition: all 0.15s; }
    .task-check:checked { background: #3d8f4b; border-color: #3d8f4b; }
    .task-check:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: 1.5px solid #e2f0d9; border-top: none; border-left: none; transform: rotate(45deg); }
    .task-plant-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .task-body { flex: 1; min-width: 0; }
    .task-desc { font-size: 13px; color: #1e3d1e; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; }
    .task-meta { font-size: 11px; color: #94aa94; margin-top: 1px; }
    .task-date { font-size: 11px; color: #94aa94; flex-shrink: 0; white-space: nowrap; }
    .task-date.today { color: #2d5c1e; font-weight: 500; }
    .task-date.overdue { color: #b05a2a; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: #7a9a7a; font-size: 14px; }
    .empty-state .icon { font-size: 32px; margin-bottom: 0.5rem; }

    /* MOBILE */
    @media (max-width: 768px) {
      .banner { padding: 6px 10px; font-size: 11px; }
      .sidebar { position: fixed; top: 0; left: 0; height: 100%; z-index: 11; transform: translateX(-100%); box-shadow: 4px 0 16px rgba(0,0,0,0.2); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: block; }
      .topbar { padding: 0.7rem 1rem; gap: 0.6rem; }
      .topbar-greeting { font-size: 15px; }
      .topbar-date { display: none; }
      .content { padding: 1rem 0.9rem; }
      .stats-row { gap: 6px; }
      .stat-card { padding: 0.5rem 0.6rem; }
      .stat-num { font-size: 18px; }
      .stat-lbl { font-size: 9px; letter-spacing: 0.04em; }
      .filter-row { gap: 4px; }
      .filter-label { min-width: 100%; margin-bottom: 2px; font-size: 9px; }
      .filter-btn { padding: 4px 10px; font-size: 12px; }
      .filter-select-wrap { max-width: 100%; }
      .task-item { padding: 0.6rem 0.8rem; gap: 8px; }
      .task-desc { font-size: 12px; white-space: normal; }
      .task-meta { font-size: 10px; }
      .task-date { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="banner">🌱 Aplikacja w trakcie rozwoju — dziękujemy za cierpliwość!</div>
  <div class="app">
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 28 28">
          <circle cx="14" cy="14" r="13" fill="#2d5c1e" stroke="#3a7a2a" stroke-width="0.8"/>
          <path d="M14 22 C14 22, 8 16, 8 11 C8 8, 11 6, 14 8 C17 6, 20 8, 20 11 C20 16, 14 22, 14 22Z" fill="#94c47a"/>
          <line x1="14" y1="8" x2="14" y2="22" stroke="#2d5c1e" stroke-width="1"/>
        </svg>
        <span class="sidebar-logo-text">Plant Inventory</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" href="dashboard.html">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="2"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
          Planer zadań
        </a>
        <a class="nav-item" href="add_plant.html">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="11"/><line x1="5" y1="8" x2="11" y2="8"/></svg>
          Dodaj roślinę
        </a>
        <a class="nav-item" href="inventory.html">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2 C5 2, 2 5, 2 8 C2 11, 5 13, 8 14 C11 13, 14 11, 14 8 C14 5, 11 2, 8 2Z"/><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
          Moje rośliny
        </a>
        <a class="nav-item" href="yearly_plan.html">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="11" y2="9"/><line x1="5" y1="12" x2="8" y2="12"/></svg>
          Plan roczny
        </a>
        <a class="nav-item" href="#">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12 L6 9 L9 11 L13 6"/><circle cx="13" cy="6" r="1.5" fill="currentColor" stroke="none"/></svg>
          Generuj PDF
        </a>
      </nav>
      <div class="sidebar-bottom" id="user-email">brzojr@gmail.com</div>
    </div>

    <div class="main">
      <div class="topbar">
        <button class="toggle-btn" onclick="toggleSidebar()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#4a6e4a" stroke-width="1.5">
            <line x1="2" y1="4" x2="16" y2="4"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="14" x2="16" y2="14"/>
          </svg>
        </button>
        <div class="topbar-greeting">Witaj, <span>Jolanta</span> 🌱</div>
        <div class="topbar-date" id="today-date"></div>
      </div>

      <div class="content">
        <div class="stats-row">
          <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-lbl">W tygodniu</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-done">—</div><div class="stat-lbl">Wykonanych</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-pending">—</div><div class="stat-lbl">Do zrobienia</div></div>
        </div>

        <div class="filters">
          <div class="filter-row">
            <span class="filter-label">Okres</span>
            <button class="filter-btn active" onclick="setFilter('week',this)">Tydzień</button>
            <button class="filter-btn" onclick="setFilter('two-weeks',this)">2 tygodnie</button>
            <button class="filter-btn" onclick="setFilter('month',this)">Miesiąc</button>
          </div>
          <div class="filter-row">
            <span class="filter-label">Status</span>
            <button class="filter-btn active" onclick="setStatusFilter('all',this)">Wszystkie</button>
            <button class="filter-btn" onclick="setStatusFilter('pending',this)">Do zrobienia</button>
            <button class="filter-btn" onclick="setStatusFilter('done',this)">Wykonane</button>
          </div>
          <div class="filter-row">
            <span class="filter-label">Roślina</span>
            <div class="filter-select-wrap">
              <select class="filter-select" id="plant-filter" onchange="renderTasks()">
                <option value="all">Wszystkie rośliny</option>
              </select>
              <svg class="filter-select-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none">
                <path d="M1 1L5 5L9 1" stroke="#7a9a7a" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="section-title" id="section-title">Zadania — najbliższy tydzień</div>
        <div class="task-list" id="task-list">
          <div class="empty-state"><div class="icon">🌿</div><p>Ładowanie zadań...</p></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://c072lvqc8i.execute-api.eu-central-1.amazonaws.com/dev';
    const USER_ID = 'brzojr@gmail.com';
    let allTasks = [];
    let periodFilter = 'week';
    let statusFilter = 'all';
    const titles = { 'week': 'Zadania — najbliższy tydzień', 'two-weeks': 'Zadania — najbliższe 2 tygodnie', 'month': 'Zadania — najbliższy miesiąc' };

    function today() { return new Date(); }
    function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
    function formatDate(str) { return new Date(str).toLocaleDateString('pl-PL', { day: 'numeric', month: 'short' }); }
    function dateClass(str) {
      const d = new Date(str), t = today();
      t.setHours(0,0,0,0); d.setHours(0,0,0,0);
      if (d < t) return 'overdue';
      if (d.getTime() === t.getTime()) return 'today';
      return '';
    }

    function setFilter(f, btn) {
      periodFilter = f;
      document.querySelectorAll('.filter-row:nth-child(1) .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('section-title').textContent = titles[f];
      renderTasks();
    }
    function setStatusFilter(f, btn) {
      statusFilter = f;
      document.querySelectorAll('.filter-row:nth-child(2) .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    }

    function getFilteredTasks() {
      const t = today(); t.setHours(0,0,0,0);
      const days = periodFilter === 'week' ? 7 : periodFilter === 'two-weeks' ? 14 : 30;
      const end = addDays(t, days);
      const pf = document.getElementById('plant-filter').value;
      return allTasks.filter(task => {
        const d = new Date(task.date); d.setHours(0,0,0,0);
        if (d < t || d > end) return false;
        if (statusFilter === 'pending' && task._done) return false;
        if (statusFilter === 'done' && !task._done) return false;
        if (pf !== 'all' && task.plant_name !== pf) return false;
        return true;
      }).sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function plantColor(name) {
      const colors = ['#94c47a','#5a9e4a','#3a7a2a','#7ab85a','#4e8c38','#2d6020'];
      let h = 0; for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
      return colors[h % colors.length];
    }

    function renderTasks() {
      const tasks = getFilteredTasks();
      const now = today(); now.setHours(0,0,0,0);
      const week = allTasks.filter(t => {
        const d = new Date(t.date); d.setHours(0,0,0,0);
        return d >= now && d <= addDays(now, 7);
      });
      document.getElementById('stat-total').textContent = week.length;
      document.getElementById('stat-done').textContent = week.filter(t => t._done).length;
      document.getElementById('stat-pending').textContent = week.filter(t => !t._done).length;

      if (!tasks.length) {
        document.getElementById('task-list').innerHTML = '<div class="empty-state"><div class="icon">🌿</div><p>Brak zadań w tym okresie</p></div>';
        return;
      }

      document.getElementById('task-list').innerHTML = tasks.map((task, i) => {
        const dc = dateClass(task.date);
        const plantName = task.plant_name || 'roślina';
        return `<div class="task-item ${task._done ? 'done' : ''}" style="animation-delay:${i * 0.04}s">
          <input type="checkbox" class="task-check" ${task._done ? 'checked' : ''} onchange="toggleTask('${task.task_id}', this)"/>
          <div class="task-plant-dot" style="background:${plantColor(plantName)}"></div>
          <div class="task-body">
            <div class="task-desc">${task.description}</div>
            <div class="task-meta">${plantName}</div>
          </div>
          <div class="task-date ${dc}">${dc === 'today' ? 'Dziś' : dc === 'overdue' ? 'Zaległe' : formatDate(task.date)}</div>
        </div>`;
      }).join('');
    }

    async function toggleTask(id, cb) {
      const t = allTasks.find(t => t.task_id === id);
      if (t) {
        t._done = cb.checked;
        renderTasks();
        try {
          await fetch(`${API}/tasks`, {
            method: "PATCH",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({task_id: id, user_id: USER_ID, status: cb.checked ? "done" : "pending"})
          });
        } catch(e) { console.error("Failed to update task:", e); }
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const isMobile = window.innerWidth <= 768;
      if (isMobile) {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('visible');
      } else {
        sidebar.classList.toggle('collapsed');
      }
    }

    async function loadTasks() {
      try {
        const r = await fetch(`${API}/tasks?user_id=${USER_ID}`);
        const data = await r.json();
        allTasks = (Array.isArray(data) ? data : JSON.parse(data.body || '[]')).map(t => ({...t, _done: t.status === 'done'}));
        const plants = [...new Set(allTasks.map(t => t.plant_name || null).filter(Boolean))];
        const sel = document.getElementById('plant-filter');
        plants.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o); });
        renderTasks();
      } catch(e) {
        document.getElementById('task-list').innerHTML = '<div class="empty-state"><div class="icon">🌿</div><p>Błąd ładowania zadań. Sprawdź połączenie.</p></div>';
      }
    }

    document.getElementById('today-date').textContent = new Date().toLocaleDateString('pl-PL', { weekday: 'long', day: 'numeric', month: 'long' });
    loadTasks();
  </script>
</body>
</html>
